<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Multipart Form Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 560px;
      margin: 48px auto;
      line-height: 1.6;
    }
    label {
      display: block;
      margin: 16px 0 6px;
    }
    input, button {
      font: inherit;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
    }
    button {
      margin-top: 20px;
      padding: 8px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>最简单的 multipart 表单</h1>

  <form action="/submit" method="post" enctype="multipart/form-data">
    <label for="username">用户名</label>
    <input id="username" name="username" value="Tom">

    <label for="age">年龄</label>
    <input id="age" name="age" type="number" value="18">

    <label for="avatar">头像文件</label>
    <input id="avatar" name="avatar" type="file">

    <button type="submit">提交表单</button>
  </form>
</body>
</html>
